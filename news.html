<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiens Azerbaijan - Xəbərlər</title>
    <!-- İkonlar üçün FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Premium Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── PREMIUM EKOLOGİK-LÜKS AYARLAR ── */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        background-color: #f4fcf9;
        color: #1e293b;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* ── SPIDER WEB CANVAS (Arxa fon animasiyası üçün) ── */
      #spiderWebCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
        display: block;
      }

      /* ── PREMIUM ŞÜŞƏ EFFEKTLİ (GLASSMORPHISM) KART ── */
      .coming-soon-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(16, 185, 129, 0.15);
        padding: 50px 40px;
        border-radius: 32px;
        text-align: center;
        max-width: 550px;
        width: 90%;
        box-shadow: 0 25px 50px rgba(16, 185, 129, 0.05);
        transform: translateY(20px);
        opacity: 0;
        animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      /* Giriş Animasiyası */
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* İkon animasiyası */
      .icon-box {
        width: 80px;
        height: 80px;
        background: rgba(16, 185, 129, 0.08);
        color: #10b981;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        margin: 0 auto 25px auto;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
      }

      .coming-soon-card h1 {
        font-size: 2rem;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .coming-soon-card p {
        color: #64748b;
        font-size: 1.05rem;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      /* Geri Qayıt Düyməsi */
      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(135deg, #10b981, #059669);
        color: #ffffff;
        text-decoration: none;
        padding: 14px 30px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 0.95rem;
        box-shadow: 0 5px 15px rgba(16, 185, 129, 0.25);
        transition: all 0.3s ease;
      }

      .btn-back:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(16, 185, 129, 0.4);
      }

      .btn-back i {
        transition: transform 0.3s ease;
      }

      .btn-back:hover i {
        transform: translateX(-4px);
      }
    </style>
  </head>
  <body>
    <!-- ── PREMIUM GÖRÜNÜŞ ── -->
    <div class="coming-soon-card">
      <div class="icon-box">
        <i class="fas fa-newspaper"></i>
      </div>
      <h1>Xəbərlər Bölməsi</h1>
      <p>
        Tiens Azerbaijan rəsmi xəbərləri, qlobal sağlamlıq trendləri və Jale
        Plaza ofisimizə aid ən son yeniliklər çox yaxında burada paylaşılacaq.
      </p>
      <!-- Əsas səhifəyə qayıtmaq üçün link -->
      <a href="index.html" class="btn-back">
        <i class="fas fa-arrow-left"></i> Ana Səhifəyə Qayıt
      </a>
    </div>

    <!-- SPIDER WEB CANVAS (Arxa plan şəbəkəsi harmoniyanı qoruyur) -->
    <canvas id="spiderWebCanvas"></canvas>

    <script>
      // ── 1. SƏHİFƏYƏ GİRƏN KİMİ ALERT VERMƏK ──
      // alert() funksiyası render prosesini tam kəsməməsi üçün çox qısa bir gecikmə ilə işə düşür
    //   window.addEventListener("DOMContentLoaded", () => {
    //     setTimeout(() => {
    //       alert("Tezliklə xidmətinizdə!");
    //     }, 100);
    //   });

      // ── 2. SPIDER WEB ANIMASIYASI ──
      const canvas = document.getElementById("spiderWebCanvas");
      if (canvas) {
        const ctx = canvas.getContext("2d");
        let particles = [];
        const particleCount = 45;
        const connectionRadius = 140;

        function adjustCanvasSize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", adjustCanvasSize);
        adjustCanvasSize();

        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.size = Math.random() * 2 + 1;
          }
          move() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
          }
          render() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(16, 185, 129, 0.35)";
            ctx.fill();
          }
        }

        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }

        function drawWebStructure() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.move();
            p.render();
          });

          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const distance = Math.hypot(
                particles[i].x - particles[j].x,
                particles[i].y - particles[j].y,
              );
              if (distance < connectionRadius) {
                const lineOpacity = (1 - distance / connectionRadius) * 0.22;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(16, 185, 129, ${lineOpacity})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
              }
            }
          }
          requestAnimationFrame(drawWebStructure);
        }
        drawWebStructure();
      }
    </script>
  </body>
</html>
